version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lenguaia-frontend-prod
    expose:
      - "80"
    restart: always
    networks:
      - lenguaia-network

  nginx:
    image: nginx:alpine
    container_name: lenguaia-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
    restart: always
    networks:
      - lenguaia-network

networks:
  lenguaia-network:
    driver: bridge
